<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All Ent App</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #070707;
      --bg-sidebar: #0f0f0f;
      --accent: #ffffff;
      --text: #f1f1f1;
      --text-muted: #888888;
      --hover: #222222;
      --border: rgba(255, 255, 255, 0.08);
      --gradient: linear-gradient(135deg, #1db954, #8a2387, #e94057, #f27121);
    }
    
    body, html {
      margin: 0;
      padding: 0;
      height: 100vh;
      width: 100vw;
      background-color: var(--bg-dark);
      overflow: hidden;
      display: flex;
      font-family: 'Inter', sans-serif;
      color: var(--text);
    }

    #sidebar {
      width: 68px;
      height: 100%;
      box-sizing: border-box;
      background-color: var(--bg-sidebar);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 50px; 
      -webkit-app-region: drag;
      border-right: 1px solid var(--border);
      box-shadow: 2px 0 10px rgba(0,0,0,0.5);
      z-index: 10;
    }

    .icon {
      width: 44px;
      height: 44px;
      margin-bottom: 16px;
      background-color: transparent;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      -webkit-app-region: no-drag;
      color: var(--text-muted);
      transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
      position: relative;
    }

    .icon:hover {
      background-color: var(--hover);
      color: var(--accent);
      transform: scale(1.05);
    }

    .icon.active {
      color: var(--accent);
      background-color: var(--hover);
    }

    .icon.active::before {
      content: '';
      position: absolute;
      left: -12px;
      top: 50%;
      transform: translateY(-50%);
      height: 20px;
      width: 4px;
      border-radius: 0 4px 4px 0;
      background: var(--text);
    }

    /* Glow effect on hover */
    .icon svg {
      transition: filter 0.3s ease;
    }
    .icon:hover svg {
      filter: drop-shadow(0 0 8px rgba(255,255,255,0.3));
    }

    #main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    #titlebar {
      height: 40px; 
      width: 100%;
      -webkit-app-region: drag;
      display: flex;
      align-items: center;
      padding-left: 24px;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
      background-color: var(--bg-dark);
      box-sizing: border-box;
      user-select: none;
      border-bottom: 1px solid var(--border);
      z-index: 10;
    }

    /* Gradient Text for Title */
    .brand-text {
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 700;
      font-size: 15px;
    }

    /* Settings Modal with Glassmorphism */
    #settings-modal {
      display: none;
      position: absolute;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(10, 10, 10, 0.7);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      z-index: 100;
      padding: 40px 60px;
      overflow-y: auto;
      animation: fadeIn 0.3s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .settings-btn {
      margin-top: auto;
      margin-bottom: 24px;
    }

    h2 {
      font-size: 28px;
      margin-top: 0;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    h3 {
      font-weight: 600;
      margin-top: 40px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      background-color: #ffffff;
      color: #000000;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button:hover {
      background-color: #e0e0e0;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(255,255,255,0.1);
    }
    
    button.secondary {
      background-color: #222;
      color: #fff;
      border: 1px solid var(--border);
    }
    button.secondary:hover {
      background-color: #333;
    }

    ul {
      list-style-type: none;
      padding: 0;
      margin-top: 20px;
    }

    li {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      margin: 8px 0;
      padding: 12px 16px;
      border-radius: 8px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      display: flex;
      align-items: center;
    }
    
    li::before {
      content: '🧩';
      margin-right: 12px;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div id="sidebar">
    <!-- Spotify Icon -->
    <div class="icon active" id="nav-spotify" onclick="switchApp('https://open.spotify.com', 'nav-spotify')" title="Spotify">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.24 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.24 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.6.18-1.2.72-1.38 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.239.54-.959.72-1.56.3z"/></svg>
    </div>
    
    <!-- YouTube Icon -->
    <div class="icon" id="nav-yt" onclick="switchApp('https://www.youtube.com', 'nav-yt')" title="YouTube">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M23.498 6.186a3.016 3.016 0 0 0-2.122-2.136C19.505 3.545 12 3.545 12 3.545s-7.505 0-9.377.505A3.017 3.017 0 0 0 .502 6.186C0 8.07 0 12 0 12s0 3.93.502 5.814a3.016 3.016 0 0 0 2.122 2.136c1.871.505 9.376.505 9.376.505s7.505 0 9.377-.505a3.015 3.015 0 0 0 2.122-2.136C24 15.93 24 12 24 12s0-3.93-.502-5.814zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
    </div>
    
    <!-- YouTube Music Icon -->
    <div class="icon" id="nav-ytm" onclick="switchApp('https://music.youtube.com', 'nav-ytm')" title="YouTube Music">
      <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
    </div>
    
    <!-- Settings Icon -->
    <div class="icon settings-btn" onclick="toggleSettings()" title="Settings">
      <svg viewBox="0 0 24 24" fill="currentColor" width="22" height="22"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.06-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.73,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.06,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.43-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.49-0.12-0.61L19.14,12.94z M12,15.6c-1.99,0-3.6-1.61-3.6-3.6 s1.61-3.6,3.6-3.6s3.6,1.61,3.6,3.6S13.99,15.6,12,15.6z"/></svg>
    </div>
  </div>
  
  <div id="main-content">
    <div id="titlebar">
      <span class="brand-text">All Ent App</span>
    </div>
    
    <!-- Settings Overlay (inside main-content so it doesn't cover sidebar) -->
    <div id="settings-modal">
      <h2>App Settings</h2>
      
      <h3>Chrome Extensions</h3>
      <p style="color: var(--text-muted); font-size: 14px; line-height: 1.5; margin-bottom: 20px; max-width: 600px;">
        Electron only supports loading unpacked Chrome extensions (folders with a manifest.json). Download and unzip an extension before adding it here.
      </p>
      
      <button onclick="loadExtension()">
        <svg viewBox="0 0 24 24" fill="currentColor" width="18" height="18"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Add Unpacked Extension
      </button>
      
      <ul id="extensions-list"></ul>
      
      <div style="margin-top: 60px;">
        <button class="secondary" onclick="toggleSettings()">Close Settings</button>
      </div>
    </div>
  </div>

  <script>
    function switchApp(url, id) {
      document.getElementById('settings-modal').style.display = 'none';
      if (window.api && window.api.toggleSettingsView) {
        window.api.toggleSettingsView(false);
      }
      
      // Update active state
      document.querySelectorAll('.icon').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
      
      window.api.switchApp(url);
    }

    function toggleSettings() {
      const modal = document.getElementById('settings-modal');
      const isOpening = modal.style.display !== 'block';
      modal.style.display = isOpening ? 'block' : 'none';
      
      if (window.api && window.api.toggleSettingsView) {
        window.api.toggleSettingsView(isOpening);
      }
      
      if(isOpening) {
        updateExtensionsList();
      }
    }

    async function loadExtension() {
      const ext = await window.api.loadExtension();
      if (ext) {
        updateExtensionsList();
      }
    }

    async function updateExtensionsList() {
      const settings = await window.api.getSettings();
      const list = document.getElementById('extensions-list');
      list.innerHTML = '';
      if(settings.extensions && settings.extensions.length > 0) {
        settings.extensions.forEach(ext => {
          const li = document.createElement('li');
          li.textContent = ext;
          list.appendChild(li);
        });
      } else {
        const li = document.createElement('li');
        li.textContent = "No extensions loaded yet.";
        li.style.background = "transparent";
        li.style.border = "1px dashed rgba(255,255,255,0.2)";
        li.style.color = "var(--text-muted)";
        list.appendChild(li);
      }
    }
  </script>
</body>
</html>
